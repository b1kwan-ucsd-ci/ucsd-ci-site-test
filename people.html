<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>People — UC San Diego Clinical Informatics Fellowship</title>

<style>
:root{--navy:#0a1024;--navy2:#0d1530;--line:rgba(255,255,255,0.1);--gold:#ffcd00;--text:#e6ebf5;--dim:#8290ad}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;background:radial-gradient(1200px 700px at 70% -10%,#12203f 0%,var(--navy) 55%);color:var(--text);font-family:Inter,system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.card{width:100%;max-width:420px;background:linear-gradient(180deg,rgba(255,255,255,0.03),rgba(255,255,255,0.01));border:1px solid var(--line);border-radius:14px;padding:38px 34px}
.eye{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold)}
h1{font-size:20px;font-weight:600;margin:14px 0 6px;letter-spacing:-0.01em}
p.sub{margin:0 0 26px;color:var(--dim);font-size:13.5px;line-height:1.55}
label{display:block;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--dim);margin-bottom:9px}
.row{display:flex;gap:10px}
input{flex:1;background:rgba(0,0,0,0.25);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:12px 14px;font-size:15px;font-family:'JetBrains Mono',monospace;letter-spacing:0.06em;outline:none}
input:focus{border-color:var(--gold)}
button{background:var(--gold);color:#0a1024;border:none;border-radius:8px;padding:0 20px;font-weight:700;font-size:14px;cursor:pointer;font-family:Inter,sans-serif}
button:hover{filter:brightness(1.06)}
.err{color:#ff8a8a;font-size:12.5px;margin-top:14px;min-height:16px;font-family:'JetBrains Mono',monospace}
.foot{margin-top:26px;padding-top:18px;border-top:1px solid var(--line);font-size:11.5px;color:var(--dim);line-height:1.5}
</style></head>

function u8(b64){return Uint8Array.from(atob(b64),function(c){return c.charCodeAt(0);});}
async function decrypt(pw){
  var raw=u8(BLOB),salt=raw.slice(0,16),iv=raw.slice(16,28),data=raw.slice(28),e=new TextEncoder();
  var bk=await crypto.subtle.importKey('raw',e.encode(pw),'PBKDF2',false,['deriveKey']);
  var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:150000,hash:'SHA-256'},bk,{name:'AES-GCM',length:256},false,['decrypt']);
  var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv},key,data);
  return new TextDecoder().decode(pt);
}
async function attempt(pw,fromForm){
  try{
    var html=await decrypt(pw);
    sessionStorage.setItem('ci_preview_pw',pw);
    document.open();document.write(html);document.close();
    return true;
  }catch(e){
    if(fromForm){document.getElementById('err').textContent='Incorrect password. Try again.';}
    sessionStorage.removeItem('ci_preview_pw');
    return false;
  }
}
(function(){
  var saved=sessionStorage.getItem('ci_preview_pw');
  if(saved){attempt(saved,false);}
  document.getElementById('f').addEventListener('submit',function(ev){ev.preventDefault();document.getElementById('err').textContent='';attempt(document.getElementById('pw').value,true);});
})();
